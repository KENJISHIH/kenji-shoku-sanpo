le-four:
  ja:
    name: ル・フール 萊法小館（らいほうしょうかん）
    name_alt: ル・フール
    location: 台中市南区
    cuisine:
    - フレンチ
    - コース
    - 完全予約制
    description: '「Le Four」はフランス語で「オーブン」を意味します。カナダ滞在経験を持つシェフのJames氏が手がける、オーブン料理が看板メニューです。

      中国語の店名「萊法」は、シェフが深く愛した祖母「来発」さんを記念して名付けられました。


      レストランは完全予約制で、シェフ一人が切り盛りし、昼夜各1回転のみ。半オープンキッチンからは、シェフがゲスト一人ひとりのために

      丁寧に食事を準備する姿を眺めることができ、食後にはJames氏自らがキッチンから出てきてお客様と記念撮影をしてくれます。コースは1,000〜1,900元で、

      パン、前菜、サラダ、スープ、メインディッシュ、デザート、ドリンクが含まれています。


      食材は予約を受けてから買い付けを行うため、非常に新鮮です。看板メニューは魚の紙包み焼き、鴨胸肉、大エビで、

      その他の料理は季節ごとにローテーションします。誕生日のお祝いやデート、家族での食事など、温かくアットホームなシーンにぴったりです。'
    dining_record_md: '## 全体の印象

      パン前菜、サラダ、スープ、中盤の一品、メイン、デザートという王道のフレンチ6コース構成。手作り感（自家製デザート、自家製ドライフルーツ）と素材本来の味（添加物を加えない調理）を大切にされており、澎湖産の天然アオリイカといった台湾の新鮮な海鮮と輸入食材を巧みに組み合わせています。ソースの仕上がりは繊細で、特に長時間煮込んだ赤ワインと牛骨のソースを合わせたリブアイステーキは当日のハイライトでした。


      ## 料理一覧


      ### スパイスチキンのバゲット・タルティーヌ

      - **食材**：ローストミニトマト、スパイスチキン、フランスパン

      - **調理法**：さっぱりとした味付け。フランスパンには海塩、黒胡椒、オリーブオイルの香りがしっかりと感じられます。

      - **おすすめの食べ方**：手を綺麗に洗ってから、そのまま手で持って召し上がってください。


      ### 澎湖産天然アオリイカと有機フルーツのサラダ 有機アップル＆ハニービネグレットソース

      - **食材**：澎湖産天然アオリイカ、川耳（一般的な黒キクラゲより小ぶりなキクラゲ）、スパイスクルミ、有機ミックスフルーツ

      - **調理法**：ローストしたスパイスクルミを加え、食感のアクセントを与えています。有機リンゴとハチミツのビネグレットソースを合わせて。

      - **シェフのコメント**：澎湖から直送された非常に新鮮なアオリイカを使用しています。

      - **おすすめの食べ方**：食べる前によく混ぜ合わせてください。


      ### カボチャと野菜のポタージュ

      - **食材**：カボチャ、たっぷりの野菜、牛乳、タピオカ

      - **調理法**：添加物を一切使用せず、大量の野菜だけで自然な甘みを引き出しています。上にはふんわりとしたミルクの泡がのり、中には食感のアクセントとしてタピオカが入っています。


      ### 野菜のクレープ包み（モッツァレラチーズ入り）

      - **食材**：モッツァレラチーズ、野菜、クレープ生地

      - **調理法**：クレープ生地にモッツァレラチーズを包み込み、加熱して仕上げています。

      - **おすすめの食べ方**：加熱されたチーズは中が大変熱くなっておりますので、切り分ける際はご注意ください。


      ### 10オンス リブアイステーキの香り焼き 赤ワインと牛骨のソース

      - **食材**：10オンスのリブアイ、赤ワインと牛骨のソース

      - **調理法**：リブアイを香ばしく焼き上げ、牛骨を長時間じっくり煮込んで抽出した赤ワインソースをかけています。

      - **シェフのコメント**：この牛骨ソースは牛肉との相性が抜群です。


      ### ハート型のデザート（マスカルポーネムース・ハチミツケーキ・桃）

      - **食材**：マスカルポーネムース、ハチミツケーキ、桃、ミントゼリー、ドライドラゴンフルーツ、バニラアイスクリーム

      - **調理法**：ハート型の可愛らしいデザート。外側はマスカルポーネのムース、中にはハチミツケーキと桃が隠れています。透明なミントのゼリー、自家製の乾燥ドラゴンフルーツ（キャンディのような食感）、バニラビーンズを使用したアイスクリームが添えられています。

      - **シェフのコメント**：デザートはすべて店内で手作りしています。


      ---


      ## 補足

      - **サービス**：パンの追加が必要な場合は、いつでもスタッフにお申し付けください。'
  en:
    name: Le Four (Lai Fa Xiao Guan)
    name_alt: The Oven
    location: South District, Taichung
    cuisine:
    - French
    - Set Menu
    - Reservation Only
    description: 'Le Four—French for "the oven"—is where Chef James works his magic.
      Having spent years in Canada, he’s made oven-baked dishes his signature. Even
      the Chinese name, *Lai Fa* (萊法), carries a deep personal meaning; it’s a heartfelt
      tribute to his beloved grandmother, *Lai-Fa* (來發).


      The restaurant is a strictly reservation-only, one-man operation with just one
      seating for lunch and dinner. You get a front-row seat to the action in the
      semi-open kitchen, where James meticulously preps every course. He even makes
      a point to come out after service to chat and snap photos with guests. A full
      set menu—including bread, appetizers, salad, soup, a main, dessert, and drinks—typically
      ranges from NT$1,000 to NT$1,900.


      Because James only shops for ingredients once a booking is confirmed, everything
      on the plate is incredibly fresh. While the menu rotates with the seasons, you
      can usually count on standouts like the paper-wrapped fish, succulent duck breast,
      and king prawns.


      Perfect for birthdays, date nights, and cozy family gatherings.'
    dining_record_md: '## Overall Impressions

      This experience follows a classic French six-course structure: an amuse-bouche,
      salad, soup, mid-course, main, and dessert. The restaurant places a heavy emphasis
      on an artisanal, "handmade" touch—from the house-crafted desserts to the sun-dried
      fruits—while letting the natural, unadulterated flavors of the ingredients shine.
      The menu masterfully pairs local Taiwanese treasures, like wild squid from Penghu,
      with premium imported goods. The sauces are particularly refined; the 10oz ribeye,
      served with a red wine beef bone reduction that tasted like it had been simmering
      for days, was the undisputed star of the show.


      ## Dishes


      ### Herbed Chicken Baguette Slices (香料雞肉法式麵包片)

      - **Ingredients**: Roasted cherry tomatoes, herbed chicken, French baguette
      slices.

      - **Preparation**: Lightly seasoned and refreshing, the baguette slices are
      toasted with fragrant olive oil, sea salt, and a crack of black pepper.

      - **How to enjoy**: Simply pick them up and enjoy them as finger food.


      ### Wild Penghu Squid & Organic Mixed Fruit Salad with Apple Honey Vinaigrette
      (澎湖野生軟絲有機綜合水果沙拉佐有機蘋果蜂蜜油醋醬)

      - **Ingredients**: Wild Penghu squid, cloud ear fungus (a smaller, more delicate
      variety of wood ear mushroom), spiced walnuts, and a selection of organic mixed
      fruits.

      - **Preparation**: Topped with toasted spiced walnuts for an extra layer of
      crunch and dressed in a bright organic apple honey vinaigrette.

      - **Chef''s notes**: The squid is sourced directly from Penghu and is exceptionally
      fresh.

      - **How to enjoy**: Give everything a good toss to ensure the vinaigrette is
      evenly distributed before diving in.


      ### Pumpkin & Vegetable Velouté (南瓜蔬菜濃湯)

      - **Ingredients**: Pumpkin, a medley of vegetables, milk, and "pearls" (tapioca).

      - **Preparation**: Completely free of artificial additives, the soup relies
      on a high volume of slow-cooked vegetables to achieve its natural sweetness.
      It’s finished with a delicate layer of frothed milk foam and contains pearls
      to add a playful chewiness to each spoonful.


      ### Savory Vegetable Crepe (蔬菜可麗餅)

      - **Ingredients**: Mozzarella cheese, seasonal vegetables, crepe batter.

      - **Preparation**: The crepe is folded around a generous helping of mozzarella
      and vegetables, then baked until the cheese is gooey and molten.

      - **How to enjoy**: The filling gets quite hot after baking, so take care when
      cutting into it.


      ### Pan-Seared 10oz Beef Ribeye with Red Wine Bone Marrow Sauce (香煎 10oz 牛肋眼佐紅酒牛骨醬汁)

      - **Ingredients**: 10oz beef ribeye, red wine beef bone reduction.

      - **Preparation**: The ribeye is perfectly seared and drizzled with a rich red
      wine sauce made by slow-reducing beef bones over a long period.

      - **Chef''s notes**: This particular bone marrow sauce is the ultimate companion
      for the beef, elevating the richness of the cut.


      ### Heart-Shaped Dessert: Mascarpone Mousse with Honey Cake and Perfume Peach
      (愛心甜點：馬斯卡彭慕斯佐蜂蜜蛋糕與香水水蜜桃)

      - **Ingredients**: Mascarpone mousse, honey cake, perfume peach, mint jelly,
      dried dragon fruit, vanilla bean ice cream.

      - **Preparation**: A stunning heart-shaped creation featuring a silky mascarpone
      mousse exterior with a hidden center of honey cake and fragrant perfume peaches.
      It’s served alongside translucent mint jelly, house-made dried dragon fruit
      "chips" (which have a candy-like snap), and a scoop of vanilla ice cream flecked
      with real vanilla bean.

      - **Chef''s notes**: Every component of the dessert is handcrafted in-house.


      ---


      ## Extra Notes

      - **Service**: If you’d like some extra bread to soak up the sauces, don’t hesitate
      to let the staff know.'
tianle-li:
  ja:
    name: 天楽里氷室（てんらくりひょうしつ）
    name_alt: 天楽里
    location: 新竹県竹北市
    cuisine:
    - 香港料理
    - 茶餐廳
    - 氷室
    - 麺類・ご飯もの
    description: '「天楽里氷室」は新竹の竹北にある香港式茶餐廳（カフェレストラン）です。オーナーは香港出身で、店名は香港の湾仔にある古い通り

      「天楽里」に由来しており、店内はノスタルジックな香港の雰囲気に包まれています。


      看板メニューの「黙然銷魂飯」はチャウ・シンチーの映画『食神』から着想を得ており、タイ産の香り米をベースに、シェフ

      秘伝の蜜汁チャーシュー、自家製醤油、ネギ生姜ダレと半熟目玉焼きを合わせた、毎日数量限定の一品です。もう一つの名物

      「干炒牛河（牛肉とライスヌードルの醤油炒め）」は鍋の香ばしい風味が際立ち、香港式茶餐廳の腕前を測る重要な指標となっています。


      その他の人気メニューには、練乳とバターのサクサクパン、香港式ミルクティー、アイスレモンティー、香港式フレンチトーストがあります。当店は

      アラカルト形式で、サービス料は不要、テイクアウトも提供しています。'
    dishes:
    - 黙然銷魂飯（映画『食神』のあの一品）
    - 干炒牛河（牛肉とライスヌードルの醤油炒め）
    - フレッシュ牛肉と卵の「出前一丁」
    - 香港式アイスレモンティー
  en:
    name: Tin Lok Lane Bing Sutt
    name_alt: Heavenly Joy Lane
    location: Zhubei City, Hsinchu County
    cuisine:
    - Hong Kong
    - Cha chaan teng
    - Bing sutt
    - Noodles & rice
    description: 'If you’re in Zhubei, Hsinchu and craving a legit taste of Hong Kong,
      Tin Lok Lane is the spot to be. It’s a classic *Cha Chaan Teng*—a traditional
      Hong Kong-style café—run by a Hong Kong native who named it after the iconic
      Tin Lok Lane in Wan Chai. The vibe inside is pure nostalgia, making you feel
      like you’ve been transported straight to old-school Hong Kong.


      Their signature dish, the "Sorrowful Onion" Rice, is a total tribute to Stephen
      Chow’s cult classic film *God of Cookery*. It’s a bowl of fragrant Thai jasmine
      rice topped with the chef’s secret-recipe honey-glazed *Char Siu* (sweet BBQ
      pork), homemade soy sauce, zesty ginger-scallion oil, and a gorgeous runny fried
      egg. It’s limited supply every day, so get there early! You also shouldn''t
      miss the Stir-Fried Beef *Ho Fun* (flat rice noodles). It’s got that essential
      *Wok Hei*—the smoky "breath of the wok"—which is the true test of a master chef
      in Hong Kong cuisine.


      Other crowd-pleasers include the "Crispy Piggy" bun (toasted with butter and
      condensed milk), classic Silk Stocking Milk Tea, Iced Lemon Tea, and their legendary
      HK-style French Toast. Everything is à la carte, there’s no service charge,
      and they’re happy to do takeout if you’re on the move.'
    dishes:
    - '"Sorrowful Soul" Char Siu Rice with Fried Egg (Mòrán Xiāohún Fàn)'
    - Stir-fried Rice Noodles with Beef (Beef Chow Fun) [Gānchǎo Niúhé]
    - Nissin Demae Itcho Instant Noodles with Fresh Beef and Egg (Xiānniúròu Dàn Chūqián
      Yīdīng)
    - Iced Lemon Tea (Dòng Níngméng Chá)
second-floor-wenxin:
  ja:
    name: セカンドフロア（弐楼）
    name_alt: セカンドフロアカフェ 台中ショウタイム文心店
    location: 台中市南屯区
    cuisine:
    - ブランチ
    - イタリアン
    - アメリカ料理
    - カフェ
    description: 'Second Floor（貳樓）は2008年に誕生しました。台北の仁愛路にある古いアパートの2階から始まり、今では「オールデイ・ブランチ」が楽しめる名店として知られています。2024年にオープンした台中秀泰文心店は、「未来の都市森林」をコンセプトにした新店舗。中央公園や文心森林公園をイメージし、豊かな緑と鏡、ガラスを多用した、モダンでリラックスできる空間が広がっています。


      天井の照明は30分サイクルで24時間の光の変化を再現しており、昼は明るい森の中にいるような、夜は都会の美しい夜景のような雰囲気を楽しめます。看板メニューのエッグベネディクト（スモークサーモンとキノコのクリームソテー）をはじめ、クロワッサンサンド、パスタ、そしてこだわりのコーヒーなどが揃っています。


      ブランチセットにはサラダ、フライドポテト、ドリンクが付き、家族団らんやビジネスランチ、映画を観た後のひとときを過ごすのにもぴったりです。お店は秀泰生活（SHOWTIME
      LIVE）文心店の1階にあり、文心森林公園のすぐ近くに位置しています。'
    dishes:
    - スモークサーモンとキノコのクリームソテー・エッグベネディクト
    - ステーキブランチ
    - ポテトポタージュ
    - アメリカーノ
    - ミックスベリーソーダ
  en:
    name: Second Floor (Er Lou)
    name_alt: Second Floor Cafe · Taichung Showtime Wenxin
    location: Nantun District, Taichung
    cuisine:
    - Brunch
    - Italian
    - American
    - Coffee
    description: 'Founded in 2008, Second Floor (貳樓, or *Er Lou*) originally started—as
      the name suggests—on the second story of an old Taipei apartment. It’s since
      become a local legend for its all-day brunch. Their Taichung Showtime Wenxin
      branch is one of their newest spots (opened in 2024), and it’s a total stunner.
      The "Future Urban Forest" theme is inspired by the nearby Central Park and Wenxin
      Forest Park, using lush greenery, mirrors, and glass to create a space that
      feels both modern and incredibly relaxing.


      One of the coolest features is the lighting, which cycles every 30 minutes to
      simulate a full 24-hour day—taking you from a sun-drenched forest vibe to a
      sparkling cityscape. On the menu, you’ll find crowd-pleasers like their Smoked
      Salmon and Creamy Mushroom Eggs Benedict, buttery croissant sandwiches, pastas,
      and top-tier specialty coffee.


      The brunch sets come fully loaded with salad, fries, and a drink. You’ll find
      them on the 1st floor of the Showtime Live Wenxin mall, right next to Wenxin
      Forest Park. Perfect for family gatherings, business lunches, and grabbing a
      bite after a movie.'
    dishes:
    - Smoked Salmon & Creamy Sauteed Mushroom Eggs Benedict
    - Steak Brunch
    - Creamy Potato Soup
    - Americano
    - Mixed Berry Sparkling Drink
kaifan-wenxin:
  ja:
    name: 開飯川食堂 文心店（カイファンチュアンショクドウ ウェンシンテン）
    name_alt: みんなで開飯
    location: 台中市南屯区
    cuisine:
    - 四川料理
    - 中華料理
    description: '「開飯川食堂（KAIFUN Together）」は、老舗「福利川菜」の正統な四川の味を受け継ぎ、「シビれる辛さ（川麻加辣）」を看板に掲げる四川料理専門店です。鮮度、香り、シビれ、辛さの4つの要素を追求した本格的な味わいが楽しめます。文心店は秀泰生活台中文心店の6階に位置しており、映画鑑賞の後に外へ出ることなく、そのままお食事を楽しめる便利な立地も魅力です。


      看板メニューには、ピーナッツと胡麻のソースが香ばしい「よだれ鶏（口水雞）」をはじめ、ニンニクの芽と藤椒（タンジャオ）オイルの爽やかな風味が特徴の「塩焼き鶏（塩焗雞）」、豚トロとイカを豪快に炒めた「翻滾吧！火辣三宝」、青唐辛子と目玉焼きを合わせた「催涙蛋」など、魅力的な逸品が揃っています。また、人数に合わせたセットメニューも充実しており、4名様用セット（NT$2,160）なら料理6品にスープ、ご飯、ドリンクが付いて大変お得です。


      ご家族での会食やご友人との集まり、ビジネスシーンでのご利用にも最適です。'
    signature_dishes:
    - よだれ鶏（口水雞）
    - 看板の塩焼き鶏（塩焗雞）
    - 翻滾吧！火辣三宝（豚トロとイカの香辣炒め）
    - 催涙蛋（青唐辛子と目玉焼き）
    dishes:
    - 海老と卵のふんわり炒め
    - 豆豉ソース蒸しスペアリブ
    - 牛肉と青ネギの炒め
    - 鶏肉の甘酢あんかけ（糖醋雞球）
    - ガーリックソース蒸し豚バラ
    - 麻婆豆腐
    - 客家風炒め物（客家小炒）
    - サンラータン（酸辣湯）
    - アサリのスープ
    - 空心菜炒め
    - キャベツ炒め
    - 三色前菜
  en:
    name: KAIFUN (Wenxin Branch)
    name_alt: Let's Eat Together
    location: Nantun District, Taichung
    cuisine:
    - Sichuan
    - Chinese
    - Family Style
    description: 'If you’re craving that legit Sichuan kick, KAIFUN Together is a
      must-visit. Carrying on the torch from the legendary "Fuli Sichuan Cuisine,"
      they specialize in that signature numbing heat. Their menu hits all the right
      notes: fresh, aromatic, "mā" (numbing), and "là" (spicy). The Wenxin branch
      is tucked away on the 6th floor of Showtime Live Taichung Wenxin, so you can
      head straight from the cinema to the table without even leaving the mall.


      You can''t go wrong with their classics. The "Mouth-watering Chicken" comes
      in a rich peanut and sesame sauce, while the Signature Salt-baked Chicken gets
      a punchy lift from garlic sprouts and rattan pepper oil. For some real fire,
      try the "Tumbling Spicy Trio"—a stir-fry of Matsusaka pork (tender pork jowl)
      and squid—or the "Tear-jerking Eggs," which are crispy fried eggs tossed with
      large green chilies. If you’re with a group, their set menus are the way to
      go; the 4-person "Hé cài" (family-style sharing) set is NT$2,160 and covers
      six dishes, soup, rice, and drinks.


      Perfect for family dinners, sharing a big meal with friends, and business gatherings.'
    dishes:
    - Shrimp with Silky Scrambled Eggs (Xiaren Huadan)
    - Steamed Spare Ribs with Black Beans (Douchi Zheng Paigu)
    - Sautéed Beef with Scallions (Congbao Niurou)
    - Sweet and Sour Chicken Balls (Tangcu Jiqiu)
    - Sliced Pork with Garlic Sauce (Pork Belly with Garlic Puree, Suanni Bairou)
    - Mapo Tofu (Spicy Tofu with Minced Pork, Mapo Doufu)
    - Hakka Stir-fry (Dried Tofu and Pork Stir-fry, Kejia Xiaochao)
    - Hot and Sour Soup (Suanla Tang)
    - Clam Soup (Ginger Clam Soup, Geli Tang)
    - Stir-fried Water Spinach (Sautéed Morning Glory, Chao Kongxincai)
    - Stir-fried Cabbage (Chao Gaolicai)
    - Trio of Side Dishes (Assorted Three-Color Appetizers, Sanse Xiaocai)
    signature_dishes:
    - Mouth-Watering Chicken (Poached Chicken with Sichuan Chili Oil, Kou Shui Ji)
    - Signature Salt-Baked Chicken (Yan Ju Ji)
    - Sizzling Spicy Trio (Wok-Fried Meat and Seafood with Dried Chilies, Huo La San
      Bao)
    - Tear-Jerker Eggs (Fried Eggs Stir-Fried with Green Peppers, Cui Lei Dan)
dahe-makiba-nangang:
  ja:
    name: 大河牧場 ハンバーグ専門店 南港環球店
    name_alt: 三田大河牧場 ハンバーグ
    location: 台北市南港区
    cuisine:
    - 洋食
    - ハンバーグ
    - 定食
    description: '「大河牧場 ハンバーグ専売（Mita Taiga Bokujo）」は、2023年に南港グローバルモール（Global Mall
      南港）へ台湾1号店を出店した和風ハンバーグ専門店です。伝統的な日本の「手ごね」製法にこだわり、上質な牛肉を粗挽きと細挽きの絶妙なバランスで配合。一つひとつ丁寧に手作業で成形することで、肉の旨味と肉汁をぎゅっと閉じ込めています。シェフが開発した8種類の個性豊かなソースも魅力です。


      定食はメインのほか、ご飯、4種類の小皿料理、お味噌汁がセットになっており、ご飯とお味噌汁はおかわり自由。サービス料がかからないのも嬉しいポイントです。ハンバーグは牛肉と豚肉の2種類から選べ、特に看板メニューの「チーズハンバーグ」や「和風テリヤキハンバーグ」がおすすめです。


      お店は南港グローバルモールC棟B1階のフードコート内にあり、南港駅に隣接しているためアクセスも抜群。通勤やお買い物の合間、またご家族でのクイックな食事にもぴったりの一軒です。'
    dishes:
    - プレーンハンバーグ定食
    - チーズハンバーグ定食
    - とんかつ定食
    - 生姜焼き定食
    - 照り焼きチキン定食
  en:
    name: Okawa Ranch (Dàhé Mùchǎng) Hambagu Specialty Store - Nangang Global Mall
      Branch
    name_alt: Mita Taiga Ranch · Hamburgers
    location: Nangang District, Taipei
    cuisine:
    - Japanese
    - Hamburg Steak
    - Set Meal
    description: "Mita Taiga Bokujo is a Japanese-style *hamburg* (Japanese hamburger\
      \ steak) specialist that made its Taiwan debut in 2023 at Global Mall Nangang.\
      \ They stick to traditional hand-patted techniques, using a specific ratio of\
      \ coarse and fine premium beef to lock in all that juice. To top it off, the\
      \ chef has crafted eight unique signature sauces to pair with your meal.\n\n\
      Your set meal comes fully loaded with a main, rice, four seasonal side dishes,\
      \ and miso soup. The best part? You get unlimited refills of rice and soup,\
      \ and there’s no extra service charge. While you can choose between beef or\
      \ pork patties, the house-favorite Signature Cheese and the classic Japanese\
      \ Teriyaki are the real standouts.\n\nYou’ll find them in the B1 food court\
      \ of Global Mall Nangang (Building C), right next to Nangang Station. \n\nPerfect\
      \ for commuters, shoppers, and families looking for a quick and satisfying meal."
    dishes:
    - Classic Hamburg Steak Set (Yuanwei Hanbaopai Dingshi)
    - Cheese Hamburg Steak Set (Qisi Hanbaopai Dingshi)
    - Fried Pork Cutlet Set (Tonkatsu; Zhazhupai Dingshi)
    - Ginger Pork Set (Jiangshao Zhurou Dingshi)
    - Teriyaki Chicken Thigh Set (Zhaoshao Jitui Dingshi)
cuomi-dali:
  ja:
    name: 厝秘（ツォーミー） 功夫菜・手路湯 大里店
    name_alt: チョイスミール 大里
    location: 台中市大里区
    cuisine:
    - 本格料理
    - 台湾料理
    - コース料理
    - こだわりのスープ
    description: '「厝秘（Choicemeal）」は「手間暇かけた一品料理と特製スープ」を看板に掲げ、宴会料理長の職人技を核とし、伝統的な

      台湾の宴会料理を洗練されたレストラン料理へと昇華させています。大里店は国光路沿いの国光花市近くに位置し、一軒家の建物

      内には複数のVIP個室が完備されています。各部屋の大きな窓からは日本庭園の松の景色を望むことができ、ご家族での食事会や、

      接待、お祝い事などにぴったりの雰囲気です。


      おすすめの看板メニューは、蘇杭東坡肉（トンポーロー、バゲットと高菜付き）、京醤肉絲（豚肉の甘味噌炒め、中華クレープと3種の付け合わせ付き）、

      松露滑蛋（トリュフ入りスクランブルエッグ、バゲット6切れ付き）、蟹味噌と豆腐の土鍋煮込み、エビとフルーツのサラダで、どれも食通推薦の定番の

      逸品です。ご飯には地元の霧峰香米を使用しており、モチモチとした食感とタロイモの香りが楽しめます。スープや鍋料理、例えば白菜と地鶏の鍋や、

      鴨肉の黒ごま油煮込みなどは事前の予約が必要で、大人数でシェアするのに最適です。'
    dishes:
    - 蘇州風豚の角煮（トンポーロウ）
    - 豚肉の細切り甘味噌炒め
    - トリュフ入りふわふわ卵炒め
    - 蟹みそ豆腐の土鍋煮込み
    - エビとフルーツのマヨネーズサラダ
    - 揚げ豆腐の塩卵ソース炒め
    - 水蓮菜のあっさり炒め
    - 千切り大根とアサリのスープ
  en:
    name: Cho Mi (Cuo Mi) Kung Fu Cuisine · Signature Soup (Dali Branch)
    name_alt: Choicemeal Dali
    location: Dali District, Taichung
    cuisine:
    - Craft cuisine
    - Taiwanese
    - Family-style
    - Signature soup
    description: 'Choicemeal (厝秘) is all about "Gongfu" dishes and signature soups—essentially
      the high-skill, time-intensive heavy hitters of Taiwanese cuisine. At its heart,
      the restaurant is a tribute to the legacy of the "Zong-pu-shi" (the master chefs
      behind traditional outdoor banquets known as "Ban-zhuo"), taking those rustic
      feast traditions and elevating them into a refined dining experience. Their
      Dali branch on Guoguang Road is tucked right near the local flower market, housed
      in a stunning standalone building. It features several VIP private rooms, each
      with floor-to-ceiling windows looking out onto a zen Japanese garden with manicured
      pines.

      Perfect for family gatherings, formal banquets, and special celebrations.


      You can’t go wrong with their signature Su-Hang Dongpo Pork, which surprisingly
      comes with baguettes and sauerkraut, or the Shredded Pork in Sweet Bean Sauce
      that you wrap up in thin pancakes with colorful sides. Other crowd-pleasers
      include the Truffle Scrambled Eggs (served with six slices of baguette), the
      rich Crab Roe Tofu Pot, and the refreshing Fruit Salad Shrimp—every one of them
      a classic example of expert "Gongfu" cooking. Even the rice is a standout; they
      use local Wufeng aromatic rice, which is perfectly chewy with a natural hint
      of taro. Just a heads-up: the big-ticket items like the White Cabbage & Free-range
      Chicken Pot or the Sesame Oil Braised Duck need to be pre-ordered, and they''re
      best shared with a big group.

      Perfect for foodies, family reunions, and those looking to experience elevated
      traditional Taiwanese flavors.'
    dishes:
    - Braised Pork Belly (Dongpo Pork; Su Hang Dong Po Rou)
    - Shredded Pork with Sweet Bean Sauce (Jing Jiang Pa Rou Si)
    - Scrambled Eggs with Black Truffle (Song Lu Hua Dan)
    - Tofu and Crab Roe Clay Pot (Xie Huang Dou Fu Bao)
    - Shrimp with Fruit Salad (Shui Guo Sha La Xia)
    - Golden Salted Egg Yolk Crispy Tofu (Jin Sha Nen Dou Fu)
    - Stir-fried White Water Snowflake (Qing Chao Shui Lian)
    - Clam Soup with Shredded Radish (Luo Bo Si Ge Li Tang)
jeju-kim:
  ja:
    name: 済州（チェジュ）金（キム）先生 Mr.KIM 韓国料理専門店
    name_alt: Jeju Mr.KIM · 済州ミスターキム 韓国チキン
    location: 台中市大里区
    cuisine:
    - 韓国料理
    - フライドチキン
    - 韓食
    - ラーメン
    description: '「済州金先生 Mr.KIM（済州Mr.KIM韓国チキン）」は、台中・大里にある韓国料理専門店です。2014年の創業以来、韓国・済州島出身の金店主が、お母様から受け継いだ本場の味を守り続けています。看板メニューの韓国式フライドチキンをはじめ、豆腐チゲ、トッポギ、豚肉丼などを提供。新鮮な食材にこだわり、化学調味料を一切使用しないヘルシーな料理は、地元でも評判の人気店となっています。


      スタイルは定番の韓国定食形式で、セットにはすべて日替わりのおかず（パンチャン）、黒米入りご飯、スープが付きます（鍋料理にはスープは付きません）。一番人気の「6ピースチキンセット」は、ジューシーな骨なし鶏もも肉の唐揚げが6個。味付けはプレーン、特製ソース、醤油、王道のヤンニョムソースから選べます。また、程よい辛さのスープが食欲をそそる韓国ラーメンやチーズラーメンも、本場の味を求めるファンに愛されています。そのほか、チーズ卵焼きやチーズラポッキ、ピリ辛豚肉炒め丼などのメニューも充実しています。


      付け合わせのおかずは、豆もやしのナムル、ワカメの和え物、きゅうりのピリ辛漬けの3種類で、韓国海苔やコチュジャン、塩胡椒などが添えられます。営業はランチとディナーの二部制で、お席は来店順のご案内となります。お一人様でサッと済ませたい時はもちろん、友人との食事や韓国料理好きのご家族連れにもおすすめの一軒です。'
    dishes:
    - 6ピースチキンセット
    - 韓国ラーメン
    - チーズラーメン
    - チーズケランマリ
    - チーズラッポギ
    - 豚肉のピリ辛炒め丼セット
  en:
    name: Mr.KIM Korean Cuisine (Jeju Jin Xian Sheng)
    name_alt: Jeju Mr. KIM · Korean Fried Chicken
    location: Dali District, Taichung
    cuisine:
    - Korean
    - Fried Chicken
    - Korean Cuisine
    - Ramen
    description: 'If you find yourself in Taichung’s Dali District and craving some
      serious Korean soul food, Mr. KIM (濟州金先生) is the place to be. Running strong
      since 2014, the owner—originally from Jeju Island—brought his mother’s traditional
      recipes straight to Taiwan. They specialize in crispy Korean fried chicken,
      comforting tofu stews, chewy rice cakes, and savory pork bowls. Everything is
      made fresh with strictly no MSG, which is why it’s become such a beloved local
      neighborhood favorite.


      The menu focuses on classic Korean set meals, where every tray comes loaded
      with various side dishes (known as *banchan*), nutritious purple rice, and a
      side of soup (unless you''re ordering a stew). You can’t miss their signature
      6-piece Fried Chicken Set—generous chunks of boneless chicken thigh that you
      can order in original, special house sauce, savory soy, or the classic sweet-and-spicy
      red sauce. For something cozy, they serve up Korean-style ramen—the ultimate
      comfort food—including a cheesy version that''s a total crowd-pleaser. Other
      must-tries include their fluffy cheese egg rolls, the cheese tteokbokki (spicy
      rice cakes) ramen, and the spicy stir-fried pork rice sets.


      Each meal is rounded out with three rotating sides like spicy bean sprouts,
      seasoned seaweed, and spicy cucumbers, served alongside crispy Korean seaweed
      and a variety of dipping sauces. They are open for lunch and dinner shifts and
      operate on a walk-in basis.


      Perfect for solo foodies on the go, casual hangouts with friends, and families
      who love a good Korean feast.'
    dishes:
    - 6-Piece Fried Chicken Combo
    - Korean Ramyeon
    - Cheese Ramyeon
    - Cheese Rolled Omelet (Gyeran-mari)
    - Cheese Rabokki (Stir-fried Rice Cakes and Ramen with Cheese)
    - Spicy Stir-fried Pork Rice Bowl Combo (Jeyuk-deopbap)
king-rice-bowl:
  ja:
    name: キングライスボウル 韓式丼（かんしきどん）
    name_alt: 韓国料理 キングトッパプ ・ King Rice Bowl
    location: 台北市中山区
    cuisine:
    - 韓国料理
    - ビビンバ
    - ジャジャン麺
    - 韓国料理
    description: 'King Rice Bowl（キン・トッパプ／킹덮밥 한식당）は、台北・中山区の長安東路二段の路地裏にひっそりと佇む韓国料理店です。

      中山エリアのグルメスポット「貳點零」のほど近くにあり、スタッフの多くが韓国の方。本場の家庭的な味わいが楽しめると評判で、リーズナブルな価格設定も魅力です。路地裏にありながら口コミで人気が広まった、まさに知る人ぞ知る人気店です。


      店名の「덮밥（トッパプ）」は韓国風の丼ぶりを意味し、看板メニューにはガーリック醤油の牛プルコギ丼、韓国風ピリ辛豚肉炒め丼、照り焼きチキン丼などが揃っています。

      他にも韓国風ジャージャー麺や水冷麺、スンドゥブチゲ、キムチチーズチャーハン、モッツァレラチーズ入りのジャガイモのチヂミ、さらには3〜4人でシェアできるチョッパル（豚足）など、豊富なメニューが並びます。定食にはキムチや魚肉ねりもののピリ辛炒め、大根の漬物など4種のおかずが付き、おかわり自由なのも嬉しいポイントです。


      電話やネットでの予約は受け付けておらず、来店順の注文となりますが、テイクアウトも可能です。席数は限られていますが、お一人様でのクイックな食事から、友人との会食、韓国料理好きのご家族連れまで、気軽に本場の味を楽しめる一軒です。'
    dishes:
    - チャジャンミョン
    - チャジャンうどん
    - ガーリック醤油牛丼
    - 豚肉のピリ辛炒め丼
    - 照り焼きチキン丼
    - おかず盛り合わせ（キムチ・おでん炒め・たくあん）
  en:
    name: King Rice Bowl Korean Rice Bowls (King Rice Bowl Hánshì Dòngfàn)
    name_alt: King Rice Bowl Korean Restaurant
    location: Zhongshan District, Taipei City
    cuisine:
    - Korean
    - Korean Bowl
    - Jajangmyeon
    - Korean Cuisine
    description: 'Tucked away in the narrow alleys of Taipei’s Zhongshan District,
      King Rice Bowl (킹덮밥 한식당) is a total hidden gem on Chang’an East Road. Located
      right near the bustling Zhongshan "2.0" food street, this cozy spot is run by
      a mostly Korean staff serving up authentic, home-style comfort food. It’s the
      kind of place that has built a massive local following strictly through word-of-mouth
      thanks to its legit flavors and super fair prices.


      The name "Deopbap" literally means Korean rice bowl, and their signatures like
      the Garlic Soy Beef, Spicy Stir-fried Pork, and Teriyaki Chicken bowls are absolute
      must-tries. If you’re looking to branch out, they’ve got a solid lineup including
      Jajangmyeon (black bean noodles), refreshing cold noodles, Spicy Soft Tofu Stew,
      and Kimchi Cheese Fried Rice. You also won''t want to miss the Mozzarella Potato
      Pancake or the massive Jokbal (braised pig''s trotters) which is plenty for
      a group of 3-4. Every meal comes with four types of "Banchan"—classic Korean
      side dishes like kimchi, spicy fish cakes, and pickled radish—and the best part?
      They’re unlimited!


      Just a heads-up: they only take walk-ins, so no phone or online reservations,
      though takeout is an option. Seating is a bit limited, making it a great spot
      for a quick bite or a casual sit-down.


      Perfect for solo diners, small groups of friends, and families who love Korean
      food.'
    dishes:
    - Korean Black Bean Sauce Noodles (Jajangmyeon)
    - Korean Black Bean Sauce Udon
    - Garlic Soy Glazed Beef Donburi
    - Korean Spicy Stir-fried Pork Donburi (Jeyuk-deopbap)
    - Chicken Teriyaki Donburi
    - Assorted Side Dishes (Kimchi, Spicy Stir-fried Fish Cakes, Pickled Radish)
cat-boss:
  ja:
    name: 猫老闆（マオラオバン）珈琲
    name_alt: Cat Boss ・ 猫テーマのペットフレンドリーレストラン
    location: 台中市大里区
    cuisine:
    - イタリアン
    - 洋食
    - カフェ
    - ペット可
    dishes:
    - クリーミーほうれん草のヴィーガンパスタ（Vegan・NT$210）
    - ココナッツチキンライス（平日限定の定食・NT$260）
    description: '「猫老闆珈琲（Cat Boss）」は、台中市大里区にある猫がテーマのペットフレンドリーなカフェレストランです。大里路沿いに位置し、大里運動公園からもほど近い場所にあります。店内には人懐っこい看板猫たちがたくさん迎えてくれ、食事の合間に猫たちと触れ合うことができます。猫用のおやつも販売されており、ペット（主に猫）を連れての入店も可能です。


      料理はパスタやリゾットをメインに、揚げ物、ワッフル、クロッフルなどのスイーツや自家製コーヒーが揃っています。クリームティー（奶蓋）のドリンクには可愛い猫のプリントが施されているのも魅力です。定食セットはご飯、スープ、数種類の小皿料理が付いてボリューム満点、お値段もリーズナブルです。平日は時間制限がなく、コンセント付きの座席も完備。最低消費はドリンク1杯となっています。


      猫好きの方はもちろん、パソコン作業、友人との集まり、お子様連れでの利用にも最適です（猫との触れ合いについては、店内のルールを遵守してください）。'
  en:
    name: Cat Boss Cafe (貓老闆咖啡)
    name_alt: Cat Boss · Cat-Themed & Pet-Friendly Restaurant
    location: Dali District, Taichung
    cuisine:
    - Italian
    - Casual Dining
    - Cafe
    - Pet-friendly
    dishes:
    - Creamy Spinach Vegan Pasta (NT$210)
    - Coconut Chicken Rice (weekday-only set meal, NT$260)
    description: 'If you’re hanging out in Taichung’s Dali District, make sure to
      swing by Cat Boss (貓老闆咖啡). It’s a super chill, cat-themed, pet-friendly cafe
      right on Dali Road, just a short walk from Dali Sports Park. The stars of the
      show are the many friendly rescue cats roaming around, always ready for some
      attention while you enjoy your meal. You can even pick up some cat treats in-store
      to win them over! While you can bring your own pets, the vibe here is definitely
      all about the cats.


      The menu is packed with comfort food like pasta and risotto, but they also do
      great fried snacks, waffles, and croffles. Their house coffee is excellent,
      and you shouldn’t miss their "milk cap" (奶蓋) drinks—creamy, salty-sweet foam
      tea topped with the cutest cat-themed latte art. If you''re hungry, their *jiancan*
      (簡餐)—traditional Taiwanese set meals served with rice, soup, and several side
      dishes—are great value and really filling. Best of all, there’s no time limit
      on weekdays and they have power outlets everywhere, so it''s a solid spot to
      get some work done. The only requirement is a minimum spend of at least one
      drink.


      Perfect for cat lovers, remote workers looking for a laptop-friendly spot, casual
      get-togethers, and families with kids (just remember to follow the cafe’s rules
      for interacting with our furry friends!).'
december-guihe:
  ja:
    name: 十二月（じゅうにがつ） 粥品（しゅくひん）・茶飲（さいん）・私房菜（しぼうさい） 貴和店（きわてん）
    name_alt: 12MOON 台中貴和店
    location: 台中市西区
    cuisine:
    - お粥
    - 台湾料理
    - 創作料理
    - 中華粥
    - 台湾茶専門店
    description: '十二月 粥品・茶飲・私房菜（12MOON）貴和店は、ブランドで最も美しい店舗として知られ、台中市西区の貴和街に位置しています。1951年に建てられた築70年以上のレトロな洋館で、かつてはメリノール宣教女会の施設として使われていました。建物はテラゾー仕上げの床や木目調の内装が当時のまま残されており、緑豊かな庭園や個室も完備。家族の団らんや女子会にぴったりの落ち着いた雰囲気です。


      看板メニューは、潮州風の砂鍋粥、オリジナルの台湾料理、そして多彩なドリンクで、終日お食事を楽しめます。一番人気の「桂丁鶏の骨なし地鶏粥」は、土鍋でじっくり炊き上げられた綿密な米粒の食感が特徴。ピーナッツバターやパクチー抜きのカスタマイズも可能です。他にもスペアリブのお粥や四川風の激辛水煮魚、蟹味噌シーフード豆腐鍋などの創作料理に加え、手羽先の唐揚げや蟹味噌シューマイといった点心、レモン緑茶やタイ風ミルクティーなどのドリンクも充実しています。


      前庭には10台分ほどの駐車スペースがあります。サービス料は無料で、お席の利用時間は90分制。事前の予約をおすすめします。家族での会食や女子会、ビジネスでの気軽な一杯など、幅広いシーンでご利用いただけます。'
    dishes:
    - 桂丁地鶏の骨なし中華粥（ピーナッツバター・パクチー抜き可）
    - 海鮮と豆腐の蟹みそ煮込み
    - 手羽先の唐揚げ
    - 蟹みそ焼売
    - レモングリーンティー
  en:
    name: 12MOON - Congee, Tea & Special Dishes (Shi Er Yue - Guihe Branch)
    name_alt: 12MOON · Taichung Guihe Branch
    location: West District, Taichung
    cuisine:
    - Congee
    - Taiwanese
    - Private Kitchen
    - Claypot Congee
    - Tea House
    description: '12MOON (十二月) Guihe Branch is easily the brand’s most stunning location,
      tucked away in the West District of Taichung. Housed in a gorgeous 1951 retro
      mansion—formerly a Maryknoll Sisters facility—this 70-year-old gem keeps its
      history alive with classic terrazzo floors (traditional speckled stone flooring)
      and warm wood interiors. Surrounded by a lush garden and featuring cozy private
      rooms, it’s got that perfect nostalgic vibe for a big family feast or a long-overdue
      catch-up with your besties.


      Specializing in Teochew-style claypot porridge (silky rice porridge slow-cooked
      in traditional earthenware), home-style Taiwanese dishes, and refreshing teas,
      they serve deliciousness all day long. You can''t miss their signature Guiding
      Boneless Free-range Chicken Porridge; it’s cooked to order and incredibly creamy.
      Pro tip: you can customize it to leave out the peanut butter or cilantro if
      those aren''t your thing. Beyond the porridge, dive into their private kitchen
      specialties like Sichuan-style spicy boiled fish or the savory crab roe seafood
      tofu pot. Pair those with snacks like crispy chicken wings or crab roe siu mai
      (steamed dumplings), and wash it all down with a zesty lemon green tea or a
      creamy Thai milk tea.


      There’s parking for about a dozen cars out front, and even better—no service
      fee! Keep in mind there’s a 90-minute dining limit, so it’s definitely worth
      booking a table ahead of time. Perfect for family gatherings, girls'' nights
      out, and casual business drinks.'
    dishes:
    - Gui Ding (Gui Ding) Boneless Free-Range Chicken Congee (available without peanut
      butter or cilantro)
    - Seafood and Tofu Casserole with Crab Roe
    - Fried Chicken Wings
    - Steamed Pork Dumplings with Crab Roe (Siu Mai)
    - Lemon Green Tea
hsi-chen-dali:
  ja:
    name: 喜辰（きしん）港式点心茶餐廳 台中大里店
    name_alt: 禧珍点心 · 築間グループ
    location: 台中市大里区
    cuisine:
    - 香港料理
    - 香港カフェ
    - 飲茶・点心
    - 中華粥
    dishes:
    - 和牛の湯葉巻き蒸し
    - 鶏もも肉のローズ醤油煮込み
    - 牛バラ肉のクリアスープ
    - 牛肉と卵のふわとろ粥
    - 楊枝甘露（マンゴーとグレープフルーツのデザート）
    signature_dishes:
    - 喜辰三味焼売（ホタテ・トリュフ・キャビア）
    - 喜辰五宝飯
    - 柱侯牛モツ麺
    - 天崩地裂落石フレンチトースト
    - ペンギン黒糖もちもちまん
    description: '「喜辰（シー・チェン）香港飲茶」は、築間（ジュー・ジェン）飲食グループが手掛ける香港料理ブランドです。30年以上の経験を持ち、点心界の「大仁哥（ダーレン・グー）」として名高い黄義仁（ホァン・イーレン）シェフを招聘。注文を受けてから蒸し上げる手作りの点心にこだわり、一口ごとに本場の味を届けます。台中大里店は徳芳南路に位置し、広々とした明るい空間は、ご家族での会食や大人数での集まりに最適です。


      絶妙な火加減と手仕事が光る蒸したての点心は、どれも本格派。ホタテ・トリュフ・魚卵を一度に楽しめる「喜辰三味焼売」や、ボリューム満点の「喜辰五宝飯」、「柱侯牛モツ麺」が看板メニューです。また、SNS映え間違いなしの「なだれフレンチトースト（西多士）」や、可愛らしいペンギン型の「黒糖もちもち肉まん（QQ包）」も見逃せません。ドリンクは、定番の「パンストミルクティー」から「スイカ鉄観音」まで、香港らしいメニューが揃っています。


      ご家族での食事や友人とのひととき、飲茶ファンの方におすすめの一軒です。台中駅前秀泰店は、同グループの姉妹店となります。'
  en:
    name: Xi Chen Hong Kong Style Dim Sum & Tea Restaurant (Taichung Dali)
    name_alt: 'I will search for the official English name of "築間集團" to ensure the
      translation is accurate and professional.

      Hsi-Chen Dim Sum by Jhujian Group'
    location: Dali District, Taichung
    cuisine:
    - Hong Kong Style
    - HK Cafe
    - Dim Sum
    - Congee
    dishes:
    - Steamed Wagyu Beef Balls with Bean Curd Skin (Xianzhu Wagyu Qiu)
    - Rose Soy-Poached Chicken Drumstick (Meigui Youjitui)
    - Clear Broth Beef Brisket Soup (Qingdun Niunan Tang)
    - Beef and Egg Congee (Huadan Niurou Zhou)
    - Mango Pomelo Sago (Yangzhi Ganlu)
    signature_dishes:
    - Xichen Triple-Flavor Shumai (Scallop, Truffle, Roe; Xichen Sanwei Shaomai)
    - Xichen Five Treasures Rice (Xichen Wubao Fan)
    - Chu Hou Braised Beef Offal Noodles (Zhuhou Niuza Mian)
    - '"Earth-Shattering" Falling Rock Hong Kong Style French Toast (Tianbeng Dilie
      Luoshi Xi-Duoshi)'
    - Penguin Brown Sugar Chewy Buns (Penguin Brown Sugar QQ Bao)
    description: 'Xichen Dim Sum Tea Restaurant is the latest venture from the Zhujian
      Catering Group as they dive into the world of Hong Kong-style eats. They’ve
      brought in Chef Huang Yi-ren—famously known as the "In-ge of Dim Sum" (a nod
      to a popular, reliable TV character) for his 30+ years of expertise—to lead
      the kitchen. Everything here is handmade and steamed to order, ensuring every
      bite is spot on. The Dali branch in Taichung is right on Defang South Road,
      featuring a bright, airy space that’s just right for big family dinners or sharing
      a spread with friends.


      Getting dim sum right is all about the timing and the "hand-feel" of the chef,
      and they take that craft seriously here. You’ll want to try their signature
      Three-Flavor Siu Mai (a killer combo of scallop, truffle, and caviar), the Five-Treasure
      Rice, or the savory Chu Hou Beef Offal Noodles. For the Instagram crowd, the
      "Avalanche" Hong Kong French Toast is a must-order, along with those adorable
      penguin-shaped buns filled with brown sugar and chewy mochi (or "QQ" as we call
      that bouncy texture in Taiwan). To wash it all down, they’ve got classics like
      Silk Stocking Iced Milk Tea and a unique Watermelon Tieguanyin tea.


      Perfect for family gatherings, catching up with friends, and hardcore dim sum
      fans. It’s a sister location to the branch over at Showtime Live near the Taichung
      train station.'
hsi-chen-xiutai:
  ja:
    name: 喜辰（キシン）香港点心茶餐廳 台中駅前シュータイ店
    name_alt: シージェン飲茶 · 秀泰生活 台中駅前店
    location: 台中市東区
    cuisine:
    - 香港料理
    - 香港カフェ
    - 飲茶・点心
    - 麺類・ご飯物
    dishes:
    - 牛肉の香港風炒め河粉
    - スペアリブの豆豉蒸し
    - 牛肉団子の湯葉巻き蒸し
    - 香港風焼き大根餅
    - ランチョンミートと目玉焼きのせ麺
    - 特製とろ火蒸しスープ
    signature_dishes:
    - 喜辰三種シュウマイ（喜辰三味焼売）
    - 黯然チャーシュー飯（黯然叉焼飯）
    - 黄ニラと海老のチョンファン（韭黄鮮蝦腸粉）
    - 海老ワンタン麺（鮮蝦雲吞麺）
    - エッグタルト（葡式蛋塔）
    description: '「喜辰港式点心茶餐廳 台中駅前秀泰店」は、築間（ジュー・ジエン）飲食グループが展開する香港料理ブランドです。2024年末に「秀泰生活台中駅前店」の1階へ出店しました。台中駅に隣接しており、ショッピングや映画鑑賞の帰りに立ち寄るのに大変便利な立地です。点心界の「大仁哥（ダーレングォ）」と称され、30年以上のキャリアを持つ黄義仁シェフが総指揮を執り、一流シェフによる作りたての本格点心を主役に据えています。


      看板メニューは、3つの味を一度に堪能できる「喜辰三味焼売」や、映画『食神』でおなじみの「黯然（あんぜん）チャーシュー飯」、ニラ黄と海老の蒸し春巻き（チョンファン）、海老ワンタン麺、そして本場のポルトガル風エッグタルトなど。茶餐廳（香港式カフェ）ならではの麺・飯メニューも一通り揃っており、力強い火力が生む香ばしさが自慢の「乾炒牛河（牛河粉の炒めもの）」や、定番の「餐蛋麺（ランチョンミートと目玉焼きのせ麺）」、スペアリブの豆豉蒸しなど、クラシックな香港の味を楽しめます。


      モダンなデザインが施された店内は、限られた座席数ながらも洗練された空間です。お食事の制限時間は90分となっており、通勤客や映画帰りのグループ、そして点心ファンの方々に最適です。なお、大里店とは同じグループの姉妹店です。'
  en:
    name: Xi Chen Dim Sum (Xi Chen Gang Shi Dian Xin Cha Can Ting - Showtime Live
      Taichung Station)
    name_alt: Hsi-Chen Dim Sum · Showtime Live Taichung Station Store
    location: East District, Taichung
    cuisine:
    - Hong Kong
    - HK Cafe
    - Dim Sum
    - Rice & Noodles
    dishes:
    - Beef Chow Fun (Stir-fried Rice Noodles with Beef, Gān Chǎo Niú Hé)
    - Steamed Pork Ribs with Black Bean Sauce (Chǐ Zhī Zhēng Pái Gǔ)
    - Steamed Beef Balls with Bean Curd Skin (Xiān Zhú Niú Ròu Qiú)
    - Pan-fried Radish Cake (Hong Kong Style Turnip Cake, Jiān Luó Bo Gāo)
    - Luncheon Meat and Egg Noodles (Spam and Egg Noodle Soup, Cān Dàn Miàn)
    - Double-boiled Soup (Slow-simmered Soup in Individual Pots, Yuán Zhōng Dùn Tāng)
    signature_dishes:
    - Xi Chen Trio Shumai (Three-Flavor Steamed Pork and Shrimp Dumplings, Xi Chen
      San Wei Shao Mai)
    - '"Sorrowful" BBQ Pork Rice (Honey-Glazed Char Siu with Fried Egg, Anran Cha
      Shao Fan)'
    - Shrimp and Yellow Chive Rice Noodle Rolls (Jiu Huang Xian Xia Chang Fen)
    - Shrimp Wonton Noodle Soup (Xian Xia Yun Tun Mian)
    - Portuguese Egg Tart (Pu Shi Dan Ta)
    description: 'Xi Chen Hong Kong Dim Sum (喜辰港式點心茶餐廳) is the latest venture from
      the Chu Jian Dining Group, having landed right on the first floor of Showtime
      Live Taichung Station in late 2024. Being just a stone''s throw from the Taichung
      Train Station, it''s a super convenient spot to refuel after a shopping spree
      or a movie. The kitchen is led by Chef Huang Yi-ren—famously nicknamed the "Da
      Ren Ge" (a nod to a beloved, reliable character from a popular Taiwanese drama)
      of the dim sum world—who brings over 30 years of expertise to craft star-quality,
      handmade bites.


      The menu is packed with hits, like the signature Xi Chen Three-Flavor Siu Mai
      (steamed dumplings) that lets you sample three different flavors at once. Fans
      of the classic film *The God of Cookery* will definitely want to try the "Sorrowful
      Char Siu Rice," but you also can’t go wrong with their shrimp rice rolls with
      yellow chives, shrimp wonton noodles, or flaky Portuguese-style egg tarts. They’ve
      got all the *Cha Chaan Teng* (Hong Kong-style cafe) staples covered—the Beef
      Chow Fun is loaded with *wok hei* (that signature smoky aroma from a scorching
      hot wok), and the spam and egg noodles or steamed spare ribs with black bean
      sauce are pure comfort food.


      The vibe is sleek and modern, and while the space is cozy with limited seating,
      the 90-minute dining limit ensures things stay lively. It''s a sister branch
      to their Dali location and a great addition to the local food scene.


      Perfect for commuters, post-movie hangouts, and dim sum lovers.'
qin-yuan-chun-lalaport:
  ja:
    name: 沁園春（シンエンシュン） ららぽーと台中店
    name_alt: 沁園春 ららぽーと台中
    location: 台中市東区
    cuisine:
    - 江浙料理
    - 上海料理
    - ビブグルマン
    dishes:
    - 砂鍋イェンドゥシェン（上海風豚肉と筍のスープ）
    - 蟹肉入り豆腐の煮込み
    - 上海風麩の煮込み
    - 小籠包
    - パイコー炒飯
    - 牛肉の葱炒め
    - 白身魚の甘酢あんかけ
    - キャベツ炒め
    - 葱と干し海老の煮込みそば
    signature_dishes:
    - 豚肉と竹の子の上海風スープ（砂鍋醃篤鮮）
    - 小籠包（ショウロンポウ）
    - 蟹肉入り豆腐煮込み（蟹粉豆腐）
    - 揚げ麩と野菜の醤油煮（四喜烤麩）
    - パイコーチャーハン（排骨蛋炒飯）
    description: '1949年創業の「沁園春（チンユエンチュン）」は、台中で70年以上の歴史を刻んできた江浙（こうせつ）料理の老舗で、ミシュランのビブグルマンにも連年選出されている名店です。LaLaport台中店は、東区進徳路の三井LaLaport北館5階に位置し、本店から受け継がれた伝統の上海料理を百貨店内で気軽に楽しめます。店内は広々と開放的で、ご家族での会食にも最適です。


      看板メニューの「砂鍋醃篤鮮（イェンドゥシェン）」は、白濁したスープに素材の旨味が凝縮された贅沢な味わい。蟹味噌豆腐は驚くほど滑らかで、定番の冷菜「四喜烤麩（コーフー）」は食欲をそそる一品です。蒸したての小籠包は薄皮から溢れ出す肉汁が絶品で、パラパラとした食感のパイコー卵チャーハンは、ツヤよく煮込まれた大きなスペアリブが食べ応え十分。強火で一気に炒めた牛肉のネギ炒めは香ばしさが際立ち、甘酸っぱさが後を引く魚の甘酢あんかけ、お口直しにぴったりのシャキシャキとしたキャベツ炒めなど、どのお料理も本格的です。最後は胃を優しく温めてくれる「葱と干し海老の煮込み麺」で締めくくり。一卓を囲んで、心ゆくまで満足できる至福のひとときを過ごせます。'
  en:
    name: Qin Yuan Chun (LaLaport Taichung)
    name_alt: Qin Yuan Chun · LaLaport Taichung
    location: East District, Taichung
    cuisine:
    - Jiangzhe Cuisine
    - Shanghainese Cuisine
    - Bib Gourmand
    dishes:
    - Clay Pot Cured Pork and Bamboo Shoot Soup (Yan Du Xian)
    - Braised Tofu with Crab Roe
    - Braised Wheat Gluten with Wood Ear and Mushrooms (Sixi Kaofu)
    - Steamed Pork Soup Dumplings (Xiao Long Bao)
    - Egg Fried Rice with Crispy Pork Chop
    - Sautéed Beef with Scallions
    - Sweet and Sour Fish Fillets
    - Sautéed Cabbage
    - Braised Noodles with Dried Shrimp and Scallions (Cong Kai Wei Mian)
    signature_dishes:
    - Slow-Simmered Pork and Bamboo Shoot Soup in Clay Pot (Yan Du Xian)
    - Steamed Pork Soup Dumplings (Xiao Long Bao)
    - Braised Tofu with Crab Meat and Roe
    - Traditional Braised Wheat Gluten with Mushrooms and Peanuts (Si Xi Kao Fu)
    - Egg Fried Rice with Crispy Pork Chop
    description: 'Established back in 1949, Qin Yuan Chun is a Taichung icon that’s
      been serving up incredible Jiangzhe cuisine (classic dishes from Eastern China)
      for over seven decades, consistently earning a spot on the Michelin Bib Gourmand
      list. Their LaLaport location, perched on the 5th floor of the North Wing, brings
      those time-honored Shanghainese flavors into a bright, airy mall setting.


      The star of the show is the signature *Yan Du Xian*, a clay pot soup with salted
      pork and bamboo shoots that boasts a rich, milky broth. You’ll also love the
      silky crab roe tofu and the *Four-Happiness Kaofu*—a classic cold appetizer
      of braised wheat gluten that’s the perfect palate opener. Their freshly steamed
      *Xiaolongbao* (soup dumplings) are thin-skinned and incredibly juicy, and the
      pork chop fried rice is a must-try, featuring fluffy, distinct grains paired
      with a glistening, tender braised chop. For that essential "wok hei" (the smoky
      charred aroma from a high-heat wok), go for the beef with scallions, then balance
      it out with sweet and sour fish fillets and crisp stir-fried cabbage. Finishing
      with a bowl of warming scallion noodle soup makes for a feast that’s both indulgent
      and deeply satisfying.


      Perfect for family gatherings, big group dinners, and anyone craving a classic
      Shanghainese feast.'
kin-tan:
  ja:
    name: 近炭 炉端焼き（ジンタン ろばたやき）
    name_alt: キンタン 炉端焼き
    location: 台中市西屯区
    cuisine:
    - 和食
    - 炉端焼き
    - 居酒屋
    - 串焼き
    - 刺身
    dishes:
    - キンキの炭火姿焼き
    - 子持ち鮎
    - 本マグロの中トロ
    - ドラゴンボールロール
    - イカ／イカせんべい
    - 鶏もも串
    - 鶏ひざ軟骨串
    - ズッキーニの炙り
    - ベビー白菜
    - 旬の釜飯
    - 大将特選味噌汁
    - カツサンド
    description: '「近炭」は、2026年6月に台中の朝馬商圈にオープンしたばかりの炉端焼き専門店です。一列に並んだカウンター席の目の前で、職人が炭火を操り、焼き上がった料理を伝統的な「櫂（かい）」にのせて提供するスタイルは、まさに炉端焼きならではのライブ感と情緒を再現しています。吹き抜けの開放的な空間に、銅製の排煙フードと円形の炭炉が映え、視覚的な主役となっています。


      メニューは生もの、串焼き、酒の肴を中心に展開。海鮮料理では、キンキの姿焼きや、卵がたっぷり詰まった子持ち鮎、本マグロの中トロなどが特におすすめです。串焼きは鶏もも肉や膝軟骨といった定番から、ズッキーニやベビー白菜などの焼き野菜まで充実しています。旬の食材を使った炊き立ての釜飯には、大将特製の「本日の味噌汁」が添えられ、他にも牛・豚のカツサンドや「ドラゴンボール巻き」、イカの姿焼きやイカせんべいなど、バラエティ豊かな一品が揃います。お子様連れにも嬉しい茶碗蒸しや鶏の唐揚げも用意されています。

      会食や接待、あるいは友人同士でゆっくりとお酒を酌み交わすのにも最適な一軒です。'
  en:
    name: Jintan Robatayaki (Jìn Tàn)
    name_alt: KIN-TAN Robata Grill
    location: Xitun District, Taichung
    cuisine:
    - Japanese
    - Robatayaki
    - Izakaya
    - Kushiyaki
    - Sashimi
    dishes:
    - Charcoal-Grilled Whole Kichiji (Whole Kichiji Rockfish)
    - Grilled Ayu with Roe (Komochi Ayu)
    - Bluefin Tuna Chutoro (Medium Fatty Tuna)
    - Dragon Ball Roll (Qi Long Zhu Juan)
    - Squid / Squid Crackers (Ika / Ika Senbei)
    - Chicken Thigh Skewer (Momo)
    - Chicken Knee Cartilage Skewer (Hiza Nankotsu)
    - Flame-Seared Zucchini (Jiezhuagu)
    - Baby Chinese Cabbage (Wawa Cai)
    - Seasonal Kamameshi (Iron Pot Rice)
    - Chef's Special Miso Soup (Taisho Tokusen)
    - Crispy Pork Katsu Sando (Pork Cutlet Sandwich)
    description: 'Fresh on the scene as of June 2026, Near Charcoal (Jìn Tàn) is Taichung’s
      latest must-visit in the bustling Chaoma district. This place is all about the
      authentic Robatayaki experience—a traditional Japanese style of fireside grilling.
      The heart of the restaurant is the long counter where you can watch the chefs
      work their magic over open flames, and in true old-school fashion, they serve
      your food right to you using long wooden paddles. With its high ceilings, sleek
      copper exhaust hoods, and striking circular charcoal stoves, the whole ritual
      and vibe here are next-level.


      The menu leans into fresh raw cuts, skewers, and classic drinking snacks. The
      seafood is the real showstopper—highlights include whole-grilled Kinki (a premium,
      buttery deep-sea fish), roe-stuffed Ayu (sweetfish), and melt-in-your-mouth
      Bluefin Tuna Chutoro. For skewers, the chicken thigh and crunchy knee cartilage
      are crowd-pleasers, while the charred zucchini and baby cabbage are perfect
      veggie sides. They also serve seasonal Kamameshi—kettle rice cooked in a small
      pot—made to order and paired with the chef’s daily miso soup. If you’re craving
      something more, try the beef or pork Katsu sandwiches, "Dragon Ball" sushi rolls,
      or the crispy squid crackers. Traveling with family? They’re super kid-friendly
      too, offering favorites like silky Chawanmushi (steamed egg custard) and crispy
      Karaage fried chicken.


      Perfect for group dinners, hosting guests, or just grabbing a drink with your
      inner circle.'
menya-chiuming:
  ja:
    name: 麺屋 秋鳴（メンヤ チウミン）
    name_alt: メンヤ・チウミン
    location: 台中市南区
    cuisine:
    - 和食
    - ラーメン
    - 鴨スープ
    - 鴨パイタン
    dishes:
    - 鴨だし塩ラーメン
    - 鴨パイタンラーメン（女湯）
    - 野菜炒め
    description: '麺屋 秋鳴は、台中の老舗ラーメン店「狸匠ラーメン」が手がける新ブランドで、台中初の「鴨パイタン（鴨の白濁スープ）」専門ラーメン店をうたっています。南区の文心南路沿いにあり、大慶駅から車で約4分。和風の店構えにはいつも行列ができています。鴨スープを主軸に、あっさり系とこってり系の二系統を展開しています。


      看板の鴨パイタンは、鴨ガラを強火で炊き出し、コラーゲンと香味油を泡状に乳化させた、きめ細やかでクリーミーな一杯。あっさり系の鴨だしは、鮮度の高い鴨スープとあさりをじっくり煮込み、特製の干し貝柱塩だれを合わせた、後味すっきりの軽やかな味わいです。鴨チャーシューはしっとりと淡いピンク色で、半熟味玉・オレンジ・クコの実が彩りを添えます。ほかにも鴨パイタンの激辛ラーメン、鴨二郎ラーメンなどがあり、野菜炒めといったサイドメニューも一品加えられます。


      濃淡どちらの鴨スープ系ラーメンも楽しみたい人におすすめの一軒です。'
  en:
    name: Menya Chiuming
    name_alt: Menya Chiuming Ramen
    location: South District, Taichung
    cuisine:
    - Japanese
    - Ramen
    - Duck Broth
    - Duck Paitan
    dishes:
    - Clear Duck Broth Salt Ramen
    - Duck Paitan Ramen (Onna-yu "Lady" White Broth)
    - Stir-Fried Greens
    description: 'Menya Chiuming is a new brand from the long-running Taichung ramen
      house Lijiang (Tanuki) Ramen, billed as the city''s first shop dedicated to duck
      paitan—rich, milky duck-bone broth. Tucked along Wenxin S. Rd. in Taichung''s
      South District, about a four-minute drive from Daqing Station, this Japanese-style
      spot regularly draws a queue. Everything centers on duck broth, split into two
      lines: a clear consommé and a creamy paitan.


      The signature duck paitan is made by boiling duck bones hard and whipping the
      collagen and aroma oil into a fine, silky foam. The clear version slow-simmers
      ultra-fresh duck broth with clams and finishes with a house scallop-salt tare
      for a clean, easy-drinking bowl. The duck chashu is blushing-pink and tender,
      garnished with a soft-yolk egg, a slice of orange, and goji berries. The menu
      also runs to a spicy duck paitan and a Jiro-style duck ramen, plus simple sides
      like stir-fried greens.


      A great stop for anyone who wants to taste both the light and the rich sides
      of duck-broth ramen.'
fungood:
  ja:
    name: 飯穀 Fun Good（ファングッド）
    name_alt: Fun Good 家庭の小料理
    location: 台中市西区
    cuisine:
    - 台湾料理
    - 家庭料理
    - 個人セット
    - 創作家庭料理
    dishes:
    - 黒ニンニク牛と季節野菜のセット
    - 豆乳蜜香焼き豚
    - おばあちゃんの牡蠣入り卵焼き
    - 香味ねぎとエビのチャーハン
    - つみれ大根スープ
    - のりと卵のかきたまスープ
    description: '飯穀 Fun Good は、台中市西区の精美街の路地裏にひっそりと佇む家庭料理店で、「一人前のセットメニュー」を看板にしています。ワンコイン感覚で楽しめる家庭の味が評判で、ネットでの評価も高い一軒です。セットにはメイン料理に加え、台湾の定番小鉢三品、季節野菜、そして東部産の極上米「天生好米」が付き、一人でもバランスよくたっぷり味わえます。


      自慢の創作料理には、黒ニンニクと香ばしいニンニクチップを効かせた牛肉と季節野菜の炒め、ピーナッツの衣をまとった外はカリッ中はジューシーな豆乳蜜香焼き豚など。さらに、牡蠣がたっぷり入ったおばあちゃんの卵焼きや、パラリと仕上げた香味ねぎとエビのチャーハンも。スープはつみれ大根スープ、のりと卵のかきたまスープなど。手作りの日本風だし巻き卵、チャーハンや炒め刀削麺なども揃います。


      店内利用は一人あたり最低消費100元、外部飲食物の持ち込み不可、ピーク時の利用は60分制、火曜定休。一人ごはんや、路地裏の家庭の味を求める昼・夜の食事にぴったりです。'
  en:
    name: Fun Good
    name_alt: Fun Good Home-Style Bistro
    location: West District, Taichung
    cuisine:
    - Taiwanese
    - Home-Style
    - Set Meals
    - Comfort Food
    dishes:
    - Black-Garlic Beef with Seasonal Vegetables (Set)
    - Soy-Milk Honey-Glazed Crispy Pork
    - Grandma's Oyster Omelette
    - Scallion & Shrimp Fried Rice
    - Pork Meatball & Radish Soup
    - Seaweed & Egg-Drop Soup
    description: 'Fun Good is a cozy home-style eatery tucked into a lane off Jingmei
      St. in Taichung''s West District, built around set meals for one. It''s known
      for wallet-friendly comfort food and earns strong online reviews. Each set comes
      with a main dish, three classic Taiwanese small sides, seasonal vegetables, and
      "Tiansheng" premium rice from Taiwan''s east coast—a generous, balanced spread
      even for a solo diner.


      House specialties include black-garlic beef stir-fried with crispy garlic chips
      and fresh vegetables, and soy-milk honey-glazed pork in a peanut crust that''s
      crisp outside and juicy within. Round it out with grandma''s plump oyster omelette
      and a fluffy scallion-and-shrimp fried rice. Soups include pork-meatball radish
      soup and seaweed egg-drop soup, alongside handmade Japanese-style tamagoyaki,
      fried rice, and stir-fried knife-cut noodles.


      Dine-in carries a NT$100 per-person minimum, no outside food or drinks, a 60-minute
      limit at peak hours, and the shop is closed Tuesdays. Perfect for a solo meal
      or a homey lunch or dinner off the beaten path.'
kaulin-jianxing:
  ja:
    name: 高林鉄板焼き 健行店
    name_alt: カウリン鉄板焼き
    location: 台中市西区
    cuisine:
    - 鉄板焼き
    - 台湾料理
    - ステーキ
    - リーズナブル
    dishes:
    - 鉄板サイコロステーキ
    - 鉄板牛肉（玉ねぎ黒胡椒炒め）
    - 鉄板イカ
    - キャベツ炒め
    - コーンスープ
    - 焼きバナナ
    description: '高林鉄板焼きは、台中で長く愛される老舗のリーズナブルな鉄板焼き店です。健行店は西区の健行路沿い、金典緑園道の向かいにあり、国立自然科学博物館（科博館）にも近く、平日・週末を問わず行列ができる人気店です。看板は「ダブルメインのセット」で、ワンコイン感覚で主菜が二品選べ、コーンスープ・ライス・野菜炒め・もやし・食後のデザートが付きます。


      鉄板の上で職人が焼き上げる料理は、外は香ばしく中はジューシーなサイコロステーキ、玉ねぎと黒胡椒の効いた鉄板牛肉、歯ごたえのよい鉄板イカなど。付け合わせのキャベツ炒めはあっさり、名物のコーンスープは濃厚です。食後のデザートは三種から選べ、練乳をかけた焼きバナナが定番。薬味には揚げニンニクチップと胡椒塩が添えられます。クレジットカード・Apple Pay 利用可。


      リーズナブルでコスパの高い鉄板焼きを楽しみたい昼・夜の食事におすすめです。'
  en:
    name: Kaulin Teppanyaki (Jianxing)
    name_alt: Kaulin Teppanyaki
    location: West District, Taichung
    cuisine:
    - Teppanyaki
    - Taiwanese
    - Steak
    - Budget-Friendly
    dishes:
    - Teppanyaki Diced Steak
    - Teppanyaki Beef with Onions
    - Teppanyaki Squid
    - Stir-Fried Cabbage
    - Corn Soup
    - Pan-Fried Banana
    description: 'Kaulin Teppanyaki is a long-running, budget-friendly local favorite
      in Taichung. The Jianxing branch sits on Jianxing Rd. across from the Splendor
      Park boulevard, close to the Museum of Natural Science, and draws queues on weekdays
      and weekends alike. The draw is its "double-main set"—two main dishes at a wallet-friendly
      price, served with corn soup, rice, stir-fried vegetables, bean sprouts, and
      a dessert.


      Cooked to order on the iron griddle, the diced steak is seared outside and juicy
      within, the teppanyaki beef is fragrant with onion and black pepper, and the
      squid is springy and sweet. The stir-fried cabbage is light and the signature
      corn soup is rich and creamy. Dessert is a choice of three, with pan-fried banana
      drizzled in condensed milk a classic pick. Crispy garlic chips and pepper salt
      come on the side. Credit cards and Apple Pay accepted.


      A great pick for an affordable, high-value teppanyaki lunch or dinner.'
