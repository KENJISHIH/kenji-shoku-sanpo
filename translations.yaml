le-four:
  ja:
    name: ル・フール 萊法小館（らいほうしょうかん）
    name_alt: ル・フール
    location: 台中市南区
    cuisine:
    - フレンチ
    - コース
    - 完全予約制
    description: '「Le Four」はフランス語で「オーブン」を意味します。カナダ滞在経験を持つシェフのJames氏が手がける、オーブン料理が看板メニューです。

      中国語の店名「萊法」は、シェフが深く愛した祖母「来発」さんを記念して名付けられました。


      レストランは完全予約制で、シェフ一人が切り盛りし、昼夜各1回転のみ。半オープンキッチンからは、シェフがゲスト一人ひとりのために

      丁寧に食事を準備する姿を眺めることができ、食後にはJames氏自らがキッチンから出てきてお客様と記念撮影をしてくれます。コースは700〜1,600元で、

      パン、前菜、サラダ、スープ、メインディッシュ、デザート、ドリンクが含まれています。


      食材は予約を受けてから買い付けを行うため、非常に新鮮です。看板メニューは魚の紙包み焼き、鴨胸肉、大エビで、

      その他の料理は季節ごとにローテーションします。誕生日のお祝いやデート、家族での食事など、温かくアットホームなシーンにぴったりです。'
    dining_record_md: '## 全体の印象

      欧州料理と創作料理が融合したスタイルで、手作り感（自家製ミートボールやデザート、ドライフルーツなど）と素材本来の味（無添加へのこだわり）を大切にされているレストランです。澎湖産のアオリイカといった台湾の新鮮な海鮮と、オランダ産のチーズやトリュフなどの輸入食材を巧みに組み合わせており、ソースの仕上がりや風味の調和に繊細さが感じられます。


      ## 料理一覧


      ### トマトのパンケーキ [料理名要確認]

      - **食材**：トマト、パンケーキ（クラッカー風）

      - **調理法**：さっぱりとした味付け。パンケーキの表面には少しチクチクとした独特の触感があります。

      - **おすすめの食べ方**：手を綺麗に洗ってから、そのまま手で持って召し上がってください。


      ### カボチャと鴨胸肉、セルバチコのフォカッチャ

      - **食材**：フォカッチャ、カボチャ、鴨胸肉、セルバチコ

      - **シェフのコメント**：一番上に乗っているセルバチコ（ルッコラの一種）が非常に特徴的で、噛むほどに茶碗蒸しを思わせるような胡麻の香りが広がります。


      ### 豚肉と鶏肉の自家製ミートボール

      - **食材**：豚肉と鶏肉のミックス

      - **調理法**：手作りの丸い肉団子を、トマト風味のソースと合わせています。


      ### オランダ産スモークチーズのクリスプ

      - **食材**：オランダ産スモークチーズ

      - **シェフ의コメント**：スモーク処理されたチーズは、風味が強く濃厚な香りが楽しめます。


      ### 澎湖産アオリイカとキクラゲ（酸耳）の和え物

      - **食材**：澎湖産アオリイカ、酸耳（一般的な黒キクラゲより小ぶりなもの）、クルミ

      - **調理法**：乾煎りしたクルミを加え、食感のアクセントと層を重ねています。

      - **シェフのコメント**：澎湖から直送された非常に新鮮なアオリイカを使用しています。

      - **おすすめの食べ方**：食べる前によく混ぜ合わせてください。


      ### 野菜のポタージュ ミルクフォームとタピオカを添えて

      - **食材**：たっぷりの野菜、牛乳、タピオカ

      - **調理法**：添加物を一切使用せず、大量の野菜だけで自然な甘みを引き出しています。上にはふんわりとしたミルクの泡がのり、中には食感のアクセントとしてタピオカが入っています。

      - **おすすめの食べ方**：飲む前に軽く混ぜてください。


      ### トリュフとジャガイモ、豚肉の野菜クレープ包み

      - **食材**：トリュフ、ジャガイモ、豚肉、エストラゴン（ハーブの一種）

      - **調理法**：四角く形を整えたトリュフ入りのジャガイモと野菜のクレープが主役。エストラゴンのクリームソースが添えられており、豚肉の脂をさっぱりと引き立ててくれます。

      - **おすすめの食べ方**：加熱された豚肉は中が大変熱くなっておりますので、切り分ける際はご注意ください。


      ### 牛肉のソテー 牛骨のソース

      - **食材**：牛肉、牛骨

      - **調理法**：香ばしく焼き上げた牛肉に、牛骨を長時間じっくり煮込んで抽出したソースをかけています。

      - **シェフのコメント**：この牛骨ソースは牛肉との相性が抜群です。


      ### 自製ハチミツと桃のマスカルポーネムースケーキ

      - **食材**：マスカルポーネムース、ハチミツケーキ、桃、ミントゼリー、ドライドラゴンフルーツ、バニラアイスクリーム

      - **調理法**：ハート型の可愛らしいデザート。外側はマスカルポーネのムース、中にはハチミツケーキと桃が隠れています。白いミントのゼリー、自家製の乾燥ドラゴンフルーツ（キャンディのような食感）、バニラビーンズを使用したアイスクリームが添えられています。

      - **シェフのコメント**：デザートはすべて店内で手作りしています。


      ---


      ## 補足

      - **サービス**：パンの追加が必要な場合は、いつでもスタッフにお申し付けください。'
tianle-li:
  ja:
    name: 天楽里氷室（てんらくりひょうしつ）
    name_alt: 天楽里
    location: 新竹県竹北市
    cuisine:
    - 香港料理
    - 茶餐廳
    - 氷室
    - 麺類・ご飯もの
    description: '「天楽里氷室」は新竹の竹北にある香港式茶餐廳（カフェレストラン）です。オーナーは香港出身で、店名は香港の湾仔にある古い通り

      「天楽里」に由来しており、店内はノスタルジックな香港の雰囲気に包まれています。


      看板メニューの「黙然銷魂飯」はチャウ・シンチーの映画『食神』から着想を得ており、タイ産の香り米をベースに、シェフ

      秘伝の蜜汁チャーシュー、自家製醤油、ネギ生姜ダレと半熟目玉焼きを合わせた、毎日数量限定の一品です。もう一つの名物

      「干炒牛河（牛肉とライスヌードルの醤油炒め）」は鍋の香ばしい風味が際立ち、香港式茶餐廳の腕前を測る重要な指標となっています。


      その他の人気メニューには、練乳とバターのサクサクパン、香港式ミルクティー、アイスレモンティー、香港式フレンチトーストがあります。当店は

      アラカルト形式で、サービス料は不要、テイクアウトも提供しています。'
second-floor-wenxin:
  ja:
    name: セカンドフロア（弐楼）
    name_alt: セカンドフロアカフェ 台中ショウタイム文心店
    location: 台中市南屯区
    cuisine:
    - ブランチ
    - イタリアン
    - アメリカ料理
    - カフェ
    description: 'Second Floor（貳樓）は2008年に誕生しました。台北の仁愛路にある古いアパートの2階から始まり、今では「オールデイ・ブランチ」が楽しめる名店として知られています。2024年にオープンした台中秀泰文心店は、「未来の都市森林」をコンセプトにした新店舗。中央公園や文心森林公園をイメージし、豊かな緑と鏡、ガラスを多用した、モダンでリラックスできる空間が広がっています。


      天井の照明は30分サイクルで24時間の光の変化を再現しており、昼は明るい森の中にいるような、夜は都会の美しい夜景のような雰囲気を楽しめます。看板メニューのエッグベネディクト（スモークサーモンとキノコのクリームソテー）をはじめ、クロワッサンサンド、パスタ、そしてこだわりのコーヒーなどが揃っています。


      ブランチセットにはサラダ、フライドポテト、ドリンクが付き、家族団らんやビジネスランチ、映画を観た後のひとときを過ごすのにもぴったりです。お店は秀泰生活（SHOWTIME
      LIVE）文心店の1階にあり、文心森林公園のすぐ近くに位置しています。'
kaifan-wenxin:
  ja:
    name: 開飯川食堂 文心店（カイファンチュアンショクドウ ウェンシンテン）
    name_alt: みんなで開飯
    location: 台中市南屯区
    cuisine:
    - 四川料理
    - 中華料理
    - 中国料理
    description: '「開飯川食堂（KAIFUN Together）」は、老舗「福利川菜」の正統な四川の味を受け継ぎ、「シビれる辛さ（川麻加辣）」を看板に掲げる四川料理専門店です。鮮度、香り、シビれ、辛さの4つの要素を追求した本格的な味わいが楽しめます。文心店は秀泰生活台中文心店の6階に位置しており、映画鑑賞の後に外へ出ることなく、そのままお食事を楽しめる便利な立地も魅力です。


      看板メニューには、ピーナッツと胡麻のソースが香ばしい「よだれ鶏（口水雞）」をはじめ、ニンニクの芽と藤椒（タンジャオ）オイルの爽やかな風味が特徴の「塩焼き鶏（塩焗雞）」、豚トロとイカを豪快に炒めた「翻滾吧！火辣三宝」、青唐辛子と目玉焼きを合わせた「催涙蛋」など、魅力的な逸品が揃っています。また、人数に合わせたセットメニューも充実しており、4名様用セット（NT$2,160）なら料理6品にスープ、ご飯、ドリンクが付いて大変お得です。


      ご家族での会食やご友人との集まり、ビジネスシーンでのご利用にも最適です。'
dahe-makiba-nangang:
  ja:
    name: 大河牧場 ハンバーグ専門店 南港環球店
    name_alt: 三田大河牧場 ハンバーグ
    location: 台北市南港区
    cuisine:
    - 和食
    - ハンバーグ
    - 定食
    description: '「大河牧場 ハンバーグ専売（Mita Taiga Bokujo）」は、2023年に南港グローバルモール（Global Mall
      南港）へ台湾1号店を出店した和風ハンバーグ専門店です。伝統的な日本の「手ごね」製法にこだわり、上質な牛肉を粗挽きと細挽きの絶妙なバランスで配合。一つひとつ丁寧に手作業で成形することで、肉の旨味と肉汁をぎゅっと閉じ込めています。シェフが開発した8種類の個性豊かなソースも魅力です。


      定食はメインのほか、ご飯、4種類の小皿料理、お味噌汁がセットになっており、ご飯とお味噌汁はおかわり自由。サービス料がかからないのも嬉しいポイントです。ハンバーグは牛肉と豚肉の2種類から選べ、特に看板メニューの「チーズハンバーグ」や「和風テリヤキハンバーグ」がおすすめです。


      お店は南港グローバルモールC棟B1階のフードコート内にあり、南港駅に隣接しているためアクセスも抜群。通勤やお買い物の合間、またご家族でのクイックな食事にもぴったりの一軒です。'
