    description: |
      天樂里冰室是新竹竹北的港式茶餐廳,老闆來自香港,店名取自香港灣仔的老街
      「天樂里」,店內裝潢充滿懷舊港式氛圍。

      招牌「默然銷魂飯」靈感取自周星馳電影《食神》,以泰國香米為底,搭配主廚
