      「干炒牛河」鑊氣十足,是港式茶餐廳功夫菜的硬指標。

      其他人氣餐點包括奶油豬脆脆、絲襪奶茶、凍檸檬茶與法蘭西多士。餐廳採
      單點式,無服務費,提供外帶。
