# 餐廳清單 SSOT — 新增一家就加一段
#
# 改 yaml 後只要跑 `python build.py`（不必重壓照片）。
# 新增照片才要跑 `python scan.py && python build.py`。
#
# === 必填 ===
#   slug         必須對到 photos/{slug}/ 資料夾名(小寫英文 + 連字號)
#   name         餐廳名稱
#
# === 基本欄位（選填） ===
#   name_alt     副標題(原文/拼音/英文,例如 "Le Four")
#   location     縣市 / 區域
#   address      完整地址(給 Google Maps 連結 + JSON-LD)
#   phone        市話 / 行動電話
#   hours        營業時間(自由格式字串,例:"12:00-14:30 / 18:30-21:00")
#   closed       公休日(例:"週二")
#   price_range  預算區間(例:"NT$ 700-1,600 / 人")
#   reservation  訂位方式(例:"完全預約制" / "接受訂位" / "現場候位")
#   service      用餐型態+收費規則(例:"+10% 服務費" / "單點式,可外帶" / "白飯味噌湯無限續")
#   good_for     適合場合陣列(選填,留空 build 會自動從 description 抓「適合 X、Y」)
#   visited_at   YYYY-MM-DD(網頁只顯示年)
#   rating       1-5
#   cuisine      菜系標籤陣列(用來篩選)
#   description  公開簡介(≠ 私人心得,給陌生人讀的)
#   cover        封面照片檔名(對應 photos/{slug}/ 內的檔,留空則用 EXIF 第一張)
#   maps_url     Google Maps 連結,留空會自動產生
#   same_as      店家官方社群連結陣列(IG/FB/官網),會併入 JSON-LD sameAs(接在 maps_url 之後)
#                例:["https://www.instagram.com/le_four_restaurant/"]
#
# === 後補欄位（選填，任何時間補都不破壞既有資料） ===
#   dishes           菜色清單(陣列,純文字),例:["紙包魚", "鴨胸"]
#   thoughts         品嚐筆記(公開風,跟「私人 note」分開),多行用 |
#   second_visit_at  二次造訪日期(未來會升級為 visits[] 陣列)
#
# === 多語言欄位（選填，由 generate-ja.py 自動翻譯填入 translations.yaml） ===
#   name_ja / description_ja / location_ja / cuisine_ja
#   (未來加 _ko / _en 後綴)
#
# === 旅客 friendly 欄位（B4，選填，給日本/韓國/英美旅客用） ===
#   transit          交通:"台中 BRT 興大行政大樓站歩7分" / 字串
#   languages        店員可用語言:["中文", "英文", "日文"] / 陣列
#   foreign_menu     外文菜單:["英文菜單", "日文菜單"] / 陣列
#   payment          付款方式:["現金", "信用卡", "Line Pay", "悠遊卡"] / 陣列
#   dietary          飲食標記:["有素食選項", "可標示過敏原"] / 陣列(選填)
#   price_range_jpy  日圓參考價:"¥1,500-2,500 / 人"(填了會在 /ja/ 取代 price_range)
#   price_range_krw  韓元參考價:"₩6,000-12,000 / 인"(未來 /ko/ 用)
#   price_range_usd  美元參考價:"US$3-6 / person"(未來 /en/ 用)
#
# === 資料夾約定 ===
# photos/{slug}/             主菜色照片(進主 grid「本日菜色」公開)
# photos/{slug}/_menu/       菜單照、酒單照(進「菜單」section 公開)
# photos/{slug}/_docs/       店家公開文件:菜單 PDF、店面外觀照、店家簡介(進「店舖外觀／相關資料」公開)
# photos/{slug}/_private/    私人記錄:收據、訂位單、發票(本機保留,scan.py/build.py 完全不讀,永不公開)
# photos/{slug}/_captions.yaml   逐張照片 → 菜名對應表(後補)
#
# 安全閥:
# - _private/ = 「本機保留但永不公開」。收據、含金額/桌號/QR code 的單據都放這
# - 私人記事(母親節帶誰、誰生日吃的)→ 寫在 Notion,不要寫這

