    hours: "12:00-14:30 / 18:30-21:00"
    closed: "週二"
    price_range: "NT$ 1,000-1,900 / 人"
    reservation: "完全預約制"
    visited_at: "2026-05-12"
    rating: 4.5
    cuisine: ["法式", "套餐", "預約制"]
    cover: "20260512-iPhone 17 Pro134448.jpg"
    description: |
      Le Four 在法文中意為「烤箱」,主廚 James 曾旅居加拿大,以烤箱料理為招牌。
      店名「萊法」則是為了紀念主廚摯愛的阿嬤「來發」。

      餐廳採完全預約制,一人廚房,午晚各一輪。半開放廚房可以看見主廚為每位客人
      細心備餐,餐後 James 會親自走出廚房與客人合影。套餐定價 1,000-1,900 元,
      包含麵包、開胃菜、沙拉、湯品、主餐、甜點與飲品。

      食材都是接到訂位後才採購,因此非常新鮮。招牌菜包括紙包魚、鴨胸、大白蝦,
      其餘菜色則隨季節輪替。適合慶生、約會、家庭聚餐等溫馨場合。

